<body>
<div id="hdr"><div class="wrap" id="hdrIn"></div></div>
<div id="notice" class="wrap" style="padding-top:10px;padding-bottom:0"></div>

<div class="foot">Widowmaker Cup · repeats only when required · add to home screen for the full app feel</div>
<script>
// ===== Widowmaker scheduler v3: exact matching (repeats only when required) =====
function pairKey(a,b){ return a<b? a+"-"+b : b+"-"+a; }

function buildHist(rounds){
  const partner={}, opp={}, games={}, rests={}, singles={}, lastRest={};
  const bump=(m,k)=>{ m[k]=(m[k]||0)+1; };
  rounds.forEach((rd,ri)=>{
    (rd.rest||[]).forEach(p=>{ bump(rests,p); lastRest[p]=ri; });
    rd.matches.forEach(mt=>{
      const all=[...mt.a,...mt.b];
      all.forEach(p=>bump(games,p));
      if(mt.type==='S') all.forEach(p=>bump(singles,p));
      if(mt.a.length===2) bump(partner,pairKey(mt.a[0],mt.a[1]));
      if(mt.b.length===2) bump(partner,pairKey(mt.b[0],mt.b[1]));
      mt.a.forEach(x=>mt.b.forEach(y=>bump(opp,pairKey(x,y))));
    });
  });
  return {partner,opp,games,rests,singles,lastRest};
}

function structureFor(N, courts){
  let d=Math.min(courts, Math.floor(N/4));
  let used=d*4, s=0;
  while(courts-d-s>0 && N-used>=2){ s++; used+=2; }
  return {d, s, rest:N-used};
}

function shuf(arr,rng){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

// exact: all perfect matchings using only pairs with partnerCount<=lvl; collect up to cap
function matchingsAtLevel(pool, lvl, hist, rng, cap){
  const out=[];
  const arr=[...pool].sort((a,b)=>a-b);
  function dfs(rem, acc){
    if(out.length>=cap) return;
    if(rem.length===0){ out.push(acc.map(p=>[...p])); return; }
    const first=rem[0];
    const others=shuf(rem.slice(1),rng);
    for(const q of others){
      if((hist.partner[pairKey(first,q)]||0)<=lvl){
        dfs(rem.filter(x=>x!==first&&x!==q), [...acc,[first,q]]);
        if(out.length>=cap) return;
      }
    }
  }
  dfs(arr,[]);
  return out;
}
function bestLevelMatchings(pool, hist, rng, cap){
  for(let lvl=0;lvl<=8;lvl++){
    const ms=matchingsAtLevel(pool,lvl,hist,rng,cap);
    if(ms.length) return {lvl,ms};
  }
  return {lvl:99,ms:[]};
}
// partition 2d pairs into d matches, minimizing opponent-repeat cost (exact for d<=3)
function arrangeCourts(pairs, hist){
  const d=pairs.length/2;
  let best=null, bestC=Infinity;
  function opc(a,b){ let c=0; a.forEach(x=>b.forEach(y=>{const k=hist.opp[pairKey(x,y)]||0; c+=k*k;})); return c; }
  function rec(rem, acc, cost){
    if(cost>=bestC) return;
    if(rem.length===0){ bestC=cost; best=[...acc]; return; }
    const first=rem[0];
    for(let i=1;i<rem.length;i++){
      rec(rem.filter((_,j)=>j!==0&&j!==i), [...acc,[first,rem[i]]], cost+opc(first,rem[i]));
    }
  }
  rec(pairs,[],0);
  return {games:best, cost:bestC};
}

function makeRound(activeIds, courts, rounds, rng){
  const N=activeIds.length;
  if(N<2) return null;
  const hist=buildHist(rounds);
  const {d,s,rest}=structureFor(N,courts);
  const ri=rounds.length;

  // rester candidate sets (fairness-mandatory + samples of the tie group)
  let candSets=[[]];
  if(rest>0){
    const byRest=[...activeIds].sort((a,b)=>(hist.rests[a]||0)-(hist.rests[b]||0));
    const cutoff=hist.rests[byRest[rest-1]]||0;
    const mandatory=activeIds.filter(p=>(hist.rests[p]||0)<cutoff);
    const optional=activeIds.filter(p=>(hist.rests[p]||0)===cutoff);
    const fill=rest-mandatory.length;
    candSets=[]; const seen=new Set();
    // enumerate all optional-combinations when small; otherwise sample
    function choose(n,k){ let r=1; for(let i=0;i<k;i++) r=r*(n-i)/(i+1); return r; }
    if(choose(optional.length, fill)<=400){
      const combo=(start,acc)=>{
        if(acc.length===fill){ const set=[...mandatory,...acc].sort((a,b)=>a-b); candSets.push(set); return; }
        for(let i=start;i<optional.length;i++) combo(i+1,[...acc,optional[i]]);
      };
      combo(0,[]);
    } else {
      const SAMPLES=Math.min(120, 30+optional.length*10);
      for(let t=0;t<SAMPLES;t++){
        const o=shuf([...optional],rng);
        const set=[...mandatory,...o.slice(0,fill)].sort((a,b)=>a-b);
        const key=set.join(","); if(!seen.has(key)){ seen.add(key); candSets.push(set); }
      }
    }
  }

  let best=null, bestCost=Infinity;
  for(const resters of candSets){
    const pool=activeIds.filter(p=>!resters.includes(p));
    let b2b=0; resters.forEach(p=>{ if(hist.lastRest[p]===ri-1) b2b+=6; });

    // singles candidates (balance singles-count; sample best few)
    let singlesCands=[null];
    if(s>0){
      const cands=[];
      for(let i=0;i<pool.length;i++)for(let j=i+1;j<pool.length;j++){
        const a=pool[i],b=pool[j];
        cands.push({a,b, sc:(hist.singles[a]||0)+(hist.singles[b]||0), oc:(hist.opp[pairKey(a,b)]||0)});
      }
      cands.sort((x,y)=> x.sc-y.sc || x.oc-y.oc || rng()-0.5);
      singlesCands=cands.slice(0,10);
    }

    for(const sg of singlesCands){
      const dblPool = sg ? pool.filter(p=>p!==sg.a&&p!==sg.b) : pool;
      let lvl=0, msArr=[[]], mCost0=0;
      if(dblPool.length>0){
        const r=bestLevelMatchings(dblPool,hist,rng,30);
        if(!r.ms.length) continue;
        lvl=r.lvl; msArr=r.ms;
      }
      for(const m of msArr){
        // repeat penalty: count actual repeats in this matching
        let repPen=0;
        m.forEach(pr=>{ const c=hist.partner[pairKey(pr[0],pr[1])]||0; repPen+=c*c*500; });
        // urgency bonus: prefer pairing players with few fresh partners left (avoids end-game gridlock)
        let urg=0;
        m.forEach(pr=>{
          const ua=pool.filter(q=>q!==pr[0]&&(hist.partner[pairKey(pr[0],q)]||0)>0).length;
          const ub=pool.filter(q=>q!==pr[1]&&(hist.partner[pairKey(pr[1],q)]||0)>0).length;
          urg+=ua+ub;
        });
        let games=[], oppCost=0;
        if(m.length){ const arr=arrangeCourts(m,hist); games=arr.games; oppCost=arr.cost; }
        let sgCost=0;
        if(sg){ sgCost=sg.sc*6 + sg.oc*sg.oc*2; }
        const cost=repPen + oppCost*2 + sgCost + b2b - (rest===0 ? urg*3 : 0);
        if(cost<bestCost){
          const matches=[]; let court=1;
          games.forEach(([a,b])=>matches.push({type:'D',a:[...a],b:[...b],court:court++}));
          if(sg) matches.push({type:'S',a:[sg.a],b:[sg.b],court:court++});
          bestCost=cost; best={matches,rest:[...resters]};
        }
      }
    }
  }
  return best;
}

if (typeof module!=="undefined") module.exports={makeRound,buildHist,structureFor,pairKey};

// wrapper: try several restarts, keep the round with fewest forced repeats
function makeRoundBest(activeIds, courts, rounds, rngSeedFn){
  let best=null, bestScore=Infinity;
  for(let k=0;k<6;k++){
    const rng=rngSeedFn(k);
    const cand=makeRound(activeIds,courts,rounds,rng);
    if(!cand) continue;
    const hist=buildHist(rounds);
    let reps=0;
    cand.matches.forEach(m=>{
      if(m.a.length===2){ reps+=hist.partner[pairKey(m.a[0],m.a[1])]||0; }
      if(m.b.length===2){ reps+=hist.partner[pairKey(m.b[0],m.b[1])]||0; }
    });
    if(reps<bestScore){ bestScore=reps; best=cand; if(reps===0) break; }
  }
  return best;
}
if (typeof module!=="undefined") module.exports.makeRoundBest=makeRoundBest;

function mulberryE(seed){ return function(){ seed|=0; seed=(seed+0x6D2B79F5)|0; let t=Math.imul(seed^(seed>>>15),1|seed); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function generateNextRound(activeIds,courts,rounds){
  let best=null,bestScore=Infinity;
  const base=(Date.now()%100000)+rounds.length*131;
  for(let k=0;k<6;k++){
    const cand=makeRound(activeIds,courts,rounds,mulberryE(base+k*7919));
    if(!cand) continue;
    const hist=buildHist(rounds);
    let reps=0;
    cand.matches.forEach(m=>{
      if(m.a.length===2) reps+=hist.partner[pairKey(m.a[0],m.a[1])]||0;
      if(m.b.length===2) reps+=hist.partner[pairKey(m.b[0],m.b[1])]||0;
    });
    if(reps<bestScore){ bestScore=reps; best=cand; if(reps===0) break; }
  }
  return best;
}
if (typeof module!=="undefined"){ module.exports.generateNextRound=generateNextRound; module.exports.mulberryE=mulberryE; }
/* ================= APP (vanilla JS) ================= */
const ROSTER=[
 {id:0,name:"Primero",nick:"No-Reflow"},{id:1,name:"Graham",nick:"Heavily Calcified"},
 {id:2,name:"Tim",nick:"Code Blue"},{id:3,name:"Michael",nick:"Cardiogenic Shock"},
 {id:4,name:"Mikhail",nick:"Late Presentation"},{id:5,name:"Aindreas",nick:"Irregularly Irregular"},
 {id:6,name:"Travis",nick:"Troponin Leak"},{id:7,name:"Nik",nick:"Delta Wave"},
 {id:8,name:"Vimal",nick:"Innocent Murmur"},{id:9,name:"Ashwin",nick:"Torsades"},
 {id:10,name:"Gavin",nick:"Ectopic Beat"},{id:11,name:"Amro",nick:"Amrodarone"}];
const DEFAULT_SESSION={day:"Wednesday",time:"8:00\u201311:00 PM",venue:"Venue TBC",address:"Perth WA",fee:10};
const NM=id=>ROSTER[id].name, NK=id=>ROSTER[id].nick;
const LSKEY="wcup:v1";
let S={v:1,sel:[],courts:2,rounds:[],scores:{},paid:{},crowned:false,session:{...DEFAULT_SESSION}};
let draft={}, editing={}, tab="setup", storageOK=true, savedAt="", flashMsg="", confirmNew=false, pendingShared=null, editSession=false;

function enc(o){ try{ return "WCUP1|"+btoa(unescape(encodeURIComponent(JSON.stringify(o)))); }catch(e){ return ""; } }
function dec(t){ try{ const m=(t||"").match(/WCUP1\|([A-Za-z0-9+/=]+)/); const b=m?m[1]:(t||"").trim();
  const o=JSON.parse(decodeURIComponent(escape(atob(b)))); return (o&&o.rounds!==undefined)?o:null; }catch(e){ return null; } }
function save(){
  try{ localStorage.setItem(LSKEY, JSON.stringify(S)); storageOK=true;
    savedAt=new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  }catch(e){ storageOK=false; }
  paintHeader();
}
function load(){

  catch(e){ storageOK=false; }

function flash(m){ flashMsg=m; render(); setTimeout(()=>{ if(flashMsg===m){ flashMsg=""; render(); } },2600); }
async function copyText(text,ok){
  try{ await navigator.clipboard.writeText(text); flash(ok); }
  catch(e){ try{
    const ta=document.createElement("textarea"); ta.value=text; ta.style.cssText="position:fixed;opacity:0";
    document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); ta.remove(); flash(ok);
  }catch(e2){ flash("Couldn't copy \u2014 long-press to select instead"); } }
}
const activeIds=()=>S.sel.slice().sort((a,b)=>a-b);
function standings(){
  const t={}; ROSTER.forEach(p=>t[p.id]={...p,pts:0,wins:0,games:0,diff:0});
  S.rounds.forEach((rd,ri)=>rd.matches.forEach((mt,mi)=>{
    const s=S.scores[ri+"-"+mi]; if(!s) return;
    mt.a.forEach(id=>{t[id].pts+=s.a;t[id].games++;t[id].diff+=s.a-s.b;if(s.a>s.b)t[id].wins++;});
    mt.b.forEach(id=>{t[id].pts+=s.b;t[id].games++;t[id].diff+=s.b-s.a;if(s.b>s.a)t[id].wins++;});
  }));
  const list=Object.values(t).filter(p=>S.sel.includes(p.id)||p.games>0);
  list.sort((x,y)=>y.pts-x.pts||y.wins-x.wins||y.diff-x.diff||x.id-y.id);
  let rank=0,prev=null,seen=0;
  list.forEach(p=>{seen++;const k=p.pts+"|"+p.wins+"|"+p.diff;if(prev===null||k!==prev){rank=seen;prev=k;}p.rank=rank;});
  return list;
}
function rematchCount(uptoRound,pair){
  let c=0;
  S.rounds.slice(0,uptoRound).forEach(rd=>rd.matches.forEach(mt=>{
    if(mt.a.length===2&&pairKey(mt.a[0],mt.a[1])===pairKey(pair[0],pair[1]))c++;
    if(mt.b.length===2&&pairKey(mt.b[0],mt.b[1])===pairKey(pair[0],pair[1]))c++;
  }));
  return c;
}
/* ------------- actions ------------- */
function act(a,arg){
  if(a==="tab"){ tab=arg; render(); return; }
  if(a==="toggle"){ const id=+arg; S.sel=S.sel.includes(id)?S.sel.filter(x=>x!==id):[...S.sel,id]; save(); render(); return; }
  if(a==="courts"){ S.courts=+arg; save(); render(); return; }
  if(a==="start"){ if(S.sel.length<2){flash("Select at least 2 players");return;} if(S.rounds.length===0) return act("addround"); tab="rounds"; render(); return; }
  if(a==="addround"){
    if(S.sel.length<2){flash("Select at least 2 players");return;}
    const btn=document.querySelector('[data-act="addround"]'); if(btn){btn.textContent="Building round\u2026";btn.disabled=true;}
    setTimeout(()=>{
      const rd=generateNextRound(activeIds(),S.courts,S.rounds);
      if(rd){ S.rounds.push(rd); tab="rounds"; save(); } else flash("Couldn't build a round");
      render();
    },30);
    return;
  }
  if(a==="droplast"){
    const ri=S.rounds.length-1; if(ri<0) return;
    if(S.rounds[ri].matches.some((_,mi)=>S.scores[ri+"-"+mi])){ flash("Last round has scores \u2014 edit them instead"); return; }
    S.rounds.pop(); save(); render(); return;
  }
  if(a==="log"){ const key=arg; const v=draft[key]||{a:0,b:0};
    S.scores[key]={a:clampS(v.a),b:clampS(v.b)}; delete editing[key]; save(); render(); return; }
  if(a==="edit"){ draft[arg]={...(S.scores[arg]||{a:0,b:0})}; editing[arg]=true; render(); return; }
  if(a==="crown"){ S.crowned=true; save(); render(); return; }
  if(a==="uncrown"){ S.crowned=false; save(); render(); return; }
  if(a==="paid"){ const id=+arg; S.paid[id]=!S.paid[id]; save(); render(); return; }
  if(a==="sessedit"){ editSession=true; render(); return; }
  if(a==="sesscancel"){ editSession=false; render(); return; }
  if(a==="sesssave"){
    const g=(id)=>{ const el=document.getElementById(id); return el?el.value.trim():""; };
    const fee=parseFloat(g("ss-fee")); 
    S.session={ day:g("ss-day")||DEFAULT_SESSION.day, time:g("ss-time")||DEFAULT_SESSION.time,
      venue:g("ss-venue")||DEFAULT_SESSION.venue, address:g("ss-address")||g("ss-venue")||DEFAULT_SESSION.address,
      fee:(isNaN(fee)||fee<0)?DEFAULT_SESSION.fee:fee };
    editSession=false; save(); flash("Session details saved \u2713"); render(); return; }
  if(a==="newnight"){ confirmNew=true; render(); return; }
  if(a==="newnight-no"){ confirmNew=false; render(); return; }
  if(a==="newnight-yes"){ S.rounds=[];S.scores={};S.paid={};S.crowned=false;draft={};editing={};confirmNew=false;tab="setup"; save(); render(); return; }
  if(a==="copystandings"){ const st=standings();
    copyText("WIDOWMAKER CUP\n"+st.map(p=>p.rank+". "+p.nick+" ("+p.name+") \u2014 "+p.pts+" pts, "+p.wins+"W").join("\n"),"Standings copied \u2713"); return; }
  if(a==="backup"){ copyText(enc(S),"Backup code copied \u2713"); return; }
  if(a==="sharelink"){
    const url=location.origin+location.pathname+"#s="+enc(S);
    copyText(url,"Board link copied \u2713 \u2014 paste it in WhatsApp"); return; }
  if(a==="restore"){ const el=document.getElementById("restoreIn"); const o=dec(el?el.value:"");
    if(o){ S={...S,...o}; S.session={...DEFAULT_SESSION,...(S.session||{})}; draft={};editing={}; save(); flash("Restored \u2713"); render(); } else flash("Code not recognised"); return; }
  if(a==="loadshared"){ if(pendingShared){ S={...S,...pendingShared}; S.session={...DEFAULT_SESSION,...(S.session||{})}; pendingShared=null;
    history.replaceState(null,"",location.pathname); draft={};editing={}; save(); tab=S.rounds.length?"rounds":"setup"; render(); } return; }
  if(a==="dismissshared"){ pendingShared=null; history.replaceState(null,"",location.pathname); render(); return; }
}
function clampS(n){ n=parseInt(n,10); if(isNaN(n))n=0; return Math.max(0,Math.min(21,n)); }
function bump(key,side,delta,setTo){
  const cur=draft[key]||{a:0,b:0};
  const val=setTo!==undefined?setTo:clampS((cur[side]||0)+delta);
  draft[key]={...cur,[side]:clampS(val)};
  const inp=document.querySelector('input[data-skey="'+key+'"][data-side="'+side+'"]');
  if(inp) inp.value=draft[key][side];
}
